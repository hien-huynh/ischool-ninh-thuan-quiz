<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz iSchool</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 600px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .answers button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 45px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #fff;
      color: #333;
      transition: 0.2s;
    }

    .answers button:hover {
      background: #f1f1f1;
    }

    .hidden {
      display: none;
    }

    .result {
      font-size: 20px;
    }

    .start-btn {
      padding: 15px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #333;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- START -->
  <div id="start">
    <h1>🎯 Con bạn thuộc nhóm học tập nào?</h1>
    <p>Chỉ cần 6 câu hỏi nhanh để khám phá</p>
    <button class="start-btn" onclick="startQuiz()">Bắt đầu</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <h1 id="question"></h1>
    <div class="answers" id="answers"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">
    <h1>Kết quả</h1>
    <p class="result" id="resultText"></p>
    <button class="start-btn" onclick="location.reload()">Làm lại</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "Khi ở nhà, con bạn thường…",
    answers: [
      { text: "Năng động, thích vận động", type: "A" },
      { text: "Tập trung, thích học yên tĩnh", type: "B" },
      { text: "Sáng tạo, thích vẽ/làm đồ", type: "C" },
      { text: "Thích nói chuyện, giao tiếp", type: "D" }
    ]
  },
  {
    q: "Con học tốt nhất khi…",
    answers: [
      { text: "Được trải nghiệm", type: "A" },
      { text: "Được hướng dẫn rõ ràng", type: "B" },
      { text: "Tự khám phá", type: "C" },
      { text: "Học cùng bạn", type: "D" }
    ]
  },
  {
    q: "Ba mẹ mong muốn nhất ở con…",
    answers: [
      { text: "Tự tin, năng động", type: "A" },
      { text: "Kiến thức vững", type: "B" },
      { text: "Sáng tạo", type: "C" },
      { text: "Giỏi giao tiếp", type: "D" }
    ]
  },
  {
    q: "Con bạn thường gặp khó khăn ở…",
    answers: [
      { text: "Ngồi học lâu, dễ chán", type: "A" },
      { text: "Tiếp thu chậm, cần hướng dẫn kỹ", type: "B" },
      { text: "Thiếu định hướng rõ ràng", type: "C" },
      { text: "Ngại giao tiếp, thiếu tự tin", type: "D" }
    ]
  },
  {
    q: "Con thích hoạt động nào hơn?",
    answers: [
      { text: "Chơi thể thao, vận động", type: "A" },
      { text: "Làm bài tập, đọc sách", type: "B" },
      { text: "Vẽ, sáng tạo, làm mô hình", type: "C" },
      { text: "Thảo luận, trình bày ý tưởng", type: "D" }
    ]
  },
  {
    q: "Khi học một điều mới, con thường…",
    answers: [
      { text: "Thử ngay, học qua làm", type: "A" },
      { text: "Lắng nghe, ghi nhớ rồi làm theo", type: "B" },
      { text: "Tự tìm cách làm theo ý mình", type: "C" },
      { text: "Hỏi thêm và trao đổi với người khác", type: "D" }
    ]
  }
];
let current = 0;
let scores = { A: 0, B: 0, C: 0, D: 0 };

function startQuiz() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a.text;
    btn.onclick = () => selectAnswer(a.type);
    answersDiv.appendChild(btn);
  });
}

function selectAnswer(type) {
  scores[type]++;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let maxType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);

  let text = "";

  if (maxType === "A") text = "🌟 Con thuộc nhóm Năng động – Học qua trải nghiệm";
  if (maxType === "B") text = "📚 Con thuộc nhóm Học thuật – Tập trung";
  if (maxType === "C") text = "🎨 Con thuộc nhóm Sáng tạo – Tư duy mở";
  if (maxType === "D") text = "🌍 Con thuộc nhóm Giao tiếp – Hội nhập";

  document.getElementById("resultText").innerText = text;
}
</script>

</body>
</html>
